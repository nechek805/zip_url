    "redis>=7.4.0",
    "sqlalchemy>=2.0.49",
    "uvicorn[standard]>=0.46.0",
]
[dependency-groups]
dev = [
  "pytest>=8.0",
  "httpx",
  "pytest-asyncio",
  "ruff",
]
[tool.pytest.ini_options]
pythonpath = ["."]
